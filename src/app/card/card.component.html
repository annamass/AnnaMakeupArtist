<div class="card">
    <img width="260px" height="225px" src="../../assets/images/{{fotografia}}.jpg" class="card-img-top" alt="...">
    <div class="card-body">
        <h5 *ngIf="titolo" class="card-title"> {{titolo}} </h5>
        <p *ngif="descrizione" class="card-text"> {{descrizione}}</p>
        <app-button [btnType]="'primary'">{{btnLabel}}</app-button>
    </div>
</div>
